name: Selenium Tests

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      browser:
        description: "Select browser"
        required: true
        type: choice
        options:
          - chrome
          - firefox
        default: chrome

      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - uat
        default: qa

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'qa' }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven

      # Chrome
      - name: Setup Chrome
        if: env.BROWSER == 'chrome'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # Firefox
      - name: Setup Firefox
        if: env.BROWSER == 'firefox'
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox-esr

      - name: Run Selenium Tests
        run: |
          mvn clean test \
          -Dbrowser=${BROWSER} \
          -Denv=${ENVIRONMENT}

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Install Allure
        if: always()
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.35.1/allure-2.35.1.tgz
          tar -xzf allure-2.35.1.tgz

      - name: Generate Allure Report
        if: always()
        run: |
          ./allure-2.35.1/bin/allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4